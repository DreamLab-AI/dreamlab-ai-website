    <!-- Security Headers -->
    <!--
      CSP notes:
      - script-src is 'self' only: no 'unsafe-eval' (blocks eval/Function-based
        injection) and no 'unsafe-inline'. The one inline bootstrap script was
        moved to /spa-redirect.js. JSON-LD blocks below are type
        application/ld+json (data, not executable) so CSP does not gate them.
      - connect-src is scoped to the Cloudflare Workers subdomain actually used
        by this account (*.solitary-paper-764d.workers.dev: auth / pod / search /
        link-preview / nostr-relay), NOT the internet-wide *.workers.dev, which
        previously allowed exfiltration to any attacker-controlled worker.
      - style-src keeps 'unsafe-inline' because Radix UI + runtime style
        attributes require it; that is not a script-injection vector.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.solitary-paper-764d.workers.dev wss://*.solitary-paper-764d.workers.dev https://*.dreamlab-ai.com wss://*.dreamlab-ai.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
