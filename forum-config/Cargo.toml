[package]
name = "dreamlab-forum-config"
version = "3.0.0-rc10"
edition = "2021"
description = "DreamLab AI forum operator overlay for the nostr-bbs kit"
license = "Proprietary"
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
# Kit crates from nostr-rust-forum 3.0.0-rc10 (23c0c5b). rc10 pins
# solid-pod-rs alpha.14: git control API (/_git/* REST endpoints, 9 ops),
# /.well-known/apps discovery (JSS #464 app-in-pod), GitPanel + AppManifestPanel
# forum components, auto-probe on pod mount, busy guard, inline diff viewer.
nostr-bbs-core = { git = "https://github.com/DreamLab-AI/nostr-rust-forum.git", rev = "23c0c5b", package = "nostr-bbs-core" }
nostr-bbs-config = { git = "https://github.com/DreamLab-AI/nostr-rust-forum.git", rev = "23c0c5b", package = "nostr-bbs-config" }
nostr-bbs-mesh = { git = "https://github.com/DreamLab-AI/nostr-rust-forum.git", rev = "23c0c5b", package = "nostr-bbs-mesh" }
nostr-bbs-rate-limit = { git = "https://github.com/DreamLab-AI/nostr-rust-forum.git", rev = "23c0c5b", package = "nostr-bbs-rate-limit" }

serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
thiserror = "2"

# Required by nostr-bbs-rate-limit (Cloudflare Workers runtime).
# Must match the version used by nostr-bbs-rate-limit to avoid type mismatches.
worker = "0.8"
