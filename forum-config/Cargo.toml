[package]
name = "dreamlab-forum-config"
version = "3.0.0-rc4"
edition = "2021"
description = "DreamLab AI forum operator overlay for the nostr-bbs kit"
license = "Proprietary"
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
# Kit crates from crates.io (published 2026-05-07 as v3.0.0-rc4).
nostr-bbs-core = "3.0.0-rc4"
nostr-bbs-config = "3.0.0-rc4"
nostr-bbs-mesh = "3.0.0-rc4"

serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
thiserror = "2"
