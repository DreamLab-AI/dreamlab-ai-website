[package]
name = "dreamlab-forum-config"
version = "3.0.0-rc11"
edition = "2021"
description = "DreamLab AI forum operator overlay for the nostr-bbs kit"
license = "Proprietary"
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
# Kit crates from nostr-rust-forum 3.0.0-rc11 (b1b4466). This bump adds the
# forum-flow-cartography fixes: static ADMIN_PUBKEYS admin resolution (Gap 1),
# unified admin source across workers (Gap 2), fail-closed CORS (Gap 5), and a
# truthful NIP-11 write-policy (Gap 7). Keep this rev in sync with KIT_REF in
# .github/workflows/{deploy,workers-deploy}.yml.
nostr-bbs-core = { git = "https://github.com/DreamLab-AI/nostr-rust-forum.git", rev = "a91e7c7", package = "nostr-bbs-core" }
nostr-bbs-config = { git = "https://github.com/DreamLab-AI/nostr-rust-forum.git", rev = "a91e7c7", package = "nostr-bbs-config" }
nostr-bbs-mesh = { git = "https://github.com/DreamLab-AI/nostr-rust-forum.git", rev = "a91e7c7", package = "nostr-bbs-mesh" }
nostr-bbs-rate-limit = { git = "https://github.com/DreamLab-AI/nostr-rust-forum.git", rev = "a91e7c7", package = "nostr-bbs-rate-limit" }

serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
thiserror = "2"

# Required by nostr-bbs-rate-limit (Cloudflare Workers runtime).
# Must match the version used by nostr-bbs-rate-limit to avoid type mismatches.
worker = "0.8"
