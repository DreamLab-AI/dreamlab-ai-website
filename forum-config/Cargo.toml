[package]
name = "dreamlab-forum-config"
version = "3.0.0-rc11"
edition = "2021"
description = "DreamLab AI forum operator overlay for the nostr-bbs kit"
license = "Proprietary"
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
# Kit crates from nostr-rust-forum 3.0.0-rc11 (8d31f3a). rc11 pins
# solid-pod-rs alpha.15: CORS allowlist, /_admin/provision endpoint, native
# pod config schema ([native_pod]), pod browser second native pod card,
# admin panel "Native Pods" tab, auth-worker /api/native-pod/provision relay.
nostr-bbs-core = { git = "https://github.com/DreamLab-AI/nostr-rust-forum.git", rev = "8d31f3a", package = "nostr-bbs-core" }
nostr-bbs-config = { git = "https://github.com/DreamLab-AI/nostr-rust-forum.git", rev = "8d31f3a", package = "nostr-bbs-config" }
nostr-bbs-mesh = { git = "https://github.com/DreamLab-AI/nostr-rust-forum.git", rev = "8d31f3a", package = "nostr-bbs-mesh" }
nostr-bbs-rate-limit = { git = "https://github.com/DreamLab-AI/nostr-rust-forum.git", rev = "8d31f3a", package = "nostr-bbs-rate-limit" }

serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
thiserror = "2"

# Required by nostr-bbs-rate-limit (Cloudflare Workers runtime).
# Must match the version used by nostr-bbs-rate-limit to avoid type mismatches.
worker = "0.8"
