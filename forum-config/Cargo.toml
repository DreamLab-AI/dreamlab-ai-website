[package]
name = "dreamlab-forum-config"
version = "3.0.0-rc3"
edition = "2021"
description = "DreamLab AI forum operator overlay for the nostr-bbs kit"
license = "Proprietary"
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
# Kit crates from nostr-rust-forum (sibling repo on local filesystem until
# crates.io publish completes; switch to version-only after).
nostr-bbs-core = { path = "../../nostr-rust-forum/crates/nostr-bbs-core" }
nostr-bbs-config = { path = "../../nostr-rust-forum/crates/nostr-bbs-config" }
nostr-bbs-mesh = { path = "../../nostr-rust-forum/crates/nostr-bbs-mesh" }

serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
thiserror = "2"
