[package]
name = "dreamlab-forum-config"
version = "3.0.0-rc9"
edition = "2021"
description = "DreamLab AI forum operator overlay for the nostr-bbs kit"
license = "Proprietary"
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
# Kit crates from nostr-rust-forum 3.0.0-rc9 (e3f7185). rc9 pins
# solid-pod-rs alpha.13: git-pods server wiring, JSS v0.0.197 HTTP parity,
# federated NIP-05 resolver (ADR-086), TypeIndex/.jsonld fix, media containers.
nostr-bbs-core = { git = "https://github.com/DreamLab-AI/nostr-rust-forum.git", rev = "e3f7185", package = "nostr-bbs-core" }
nostr-bbs-config = { git = "https://github.com/DreamLab-AI/nostr-rust-forum.git", rev = "e3f7185", package = "nostr-bbs-config" }
nostr-bbs-mesh = { git = "https://github.com/DreamLab-AI/nostr-rust-forum.git", rev = "e3f7185", package = "nostr-bbs-mesh" }
nostr-bbs-rate-limit = { git = "https://github.com/DreamLab-AI/nostr-rust-forum.git", rev = "e3f7185", package = "nostr-bbs-rate-limit" }

serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
thiserror = "2"

# Required by nostr-bbs-rate-limit (Cloudflare Workers runtime).
# Must match the version used by nostr-bbs-rate-limit to avoid type mismatches.
worker = "0.8"
