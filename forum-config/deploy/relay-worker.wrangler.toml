# relay-worker wrangler manifest for the DreamLab deployment.
#
# CF resource IDs originally provisioned for the legacy community-forum-rs tree;
# now consumed by the nostr-rust-forum kit workers.

name = "dreamlab-nostr-relay"
main = "build/worker/shim.mjs"
compatibility_date = "2025-09-01"

[build]
command = "worker-build --release"

[vars]
RELAY_NAME       = "DreamLab Nostr Relay"
ALLOWED_ORIGIN   = "https://dreamlab-ai.com"
ALLOWED_ORIGINS  = "https://dreamlab-ai.com,https://thedreamlab.uk,https://dreamlab-ai.github.io"

# Per-IP EVENT/REQ/COUNT frame budget per rolling second (relay_do/broadcast.rs).
# The forum client self-paces to 8/s, but the budget is shared by every user
# behind one NAT IP — keep comfortably above one boot burst (~10 frames).
RATE_LIMIT_MSGS_PER_SEC = "30"

# Zone (section) access model — the relay's single source of zone truth.
# JSON array of nostr_bbs_config::schema::Zone. Mirrors forum-config/dreamlab.toml
# [[zones]] and the client's window.__ENV__.ZONE_CONFIG. Deny-by-default if absent.
ZONE_CONFIG = '[{"id":"zone1","slug":"welcome","display_name":"Welcome","required_cohorts":[],"write_cohorts":["members","agent"],"banner_image_url":"/images/heroes/lake-district-dawn.webp","visibility":"public","encrypted":false,"accent_hex":"#22c55e"},{"id":"zone2","slug":"minimoonoir","display_name":"Minimoonoir","required_cohorts":["zone2","minimoonoir"],"banner_image_url":"/images/heroes/minimoonoir-hero.webp","visibility":"locked","encrypted":false,"accent_hex":"#3b82f6","section_order":["zone2-rants"]},{"id":"zone3","slug":"family","display_name":"Family","required_cohorts":["zone3","family"],"banner_image_url":"/images/heroes/family-hero.webp","visibility":"locked","encrypted":true,"accent_hex":"#f59e0b"},{"id":"zone4","slug":"dreamlab","display_name":"DreamLab","required_cohorts":["zone4","dreamlab"],"banner_image_url":"/images/heroes/business-hero.webp","visibility":"locked","encrypted":false,"accent_hex":"#a855f7"}]'

# Admin pubkeys (x-only hex, comma-separated) — relay admin resolution.
# Mirrors forum-config/dreamlab.toml [admin].static_pubkeys and the auth-worker
# ADMIN_PUBKEYS CF secret (one admin model across all workers). The relay's
# is_admin() honours this as a static fast-path BEFORE the D1 members/whitelist
# lookup, so admin resolves without bootstrapping a D1 row (which can't be
# seeded without already being admin). Keep in sync with [admin].static_pubkeys.
ADMIN_PUBKEYS = "11ed64225dd5e2c5e18f61ad43d5ad9272d08739d3a20dd25886197b0738663c,6407eed80e2a8646e41a5ddba0ae6619425fc54af40e2b30482b9623c682425a,5d80b5facd2d746689d7d2e400db6acce5843456967054adcf6956e4c734c54c,be92ccf53d9d535fd21f3388201fd83b49588552fff5a1395fb60b6998df2243,d5194639ee3560204a1b5584a0714a6dd2a6c59953d0869b483e72ee185ada26"

# Mesh federation (PRD-010 Phase 3 / ADR-073)
MESH_MODE               = "standalone"
MESH_PEER_RELAYS        = ""
MESH_FEDERATED_KINDS    = "1,1059,30001,30050,30910,31400,31401,31402,31403,31404,31405"
MESH_ALLOWED_REMOTE_DIDS = ""

# D1 database for whitelist, events, and trust tables.
[[d1_databases]]
binding       = "DB"
database_name = "dreamlab-relay"
database_id   = "97c77d23-0e24-4325-ada7-1747eab4095b"

# Durable Object for real-time WebSocket relay.
[[durable_objects.bindings]]
name        = "RELAY"
class_name  = "NostrRelayDO"

[[migrations]]
tag         = "v1"
new_sqlite_classes = ["NostrRelayDO"]

# D1 database for NIP-98 replay protection (atomic INSERT OR IGNORE).
# Shares the auth-worker's D1 database so cross-worker replay is detected.
# The relay's own DB binding (dreamlab-relay) does not contain the
# nip98_replay table.
# (Legacy NIP98_REPLAY KV binding removed — D1 INSERT OR IGNORE is atomic.)
[[d1_databases]]
binding       = "REPLAY_DB"
database_name = "dreamlab-auth"
database_id   = "e3981999-e8f0-4c07-9e4b-2e50859b8524"
