# pod-worker wrangler manifest for the DreamLab deployment.
#
# CF resource IDs originally provisioned for the legacy community-forum-rs tree;
# now consumed by the nostr-rust-forum kit workers.

name = "dreamlab-pod-api"
main = "build/worker/shim.mjs"
compatibility_date = "2025-09-01"

[build]
command = "worker-build --release"

[[r2_buckets]]
binding     = "PODS"
bucket_name = "dreamlab-pods"

# Read-only ADMIN_KV view (split per audit H6 — pod-worker reads admin
# flags but cannot mutate them; auth-worker is the write authority).
# TODO(ops): provision via `wrangler kv:namespace create dreamlab-admin-kv`
# and grant pod-worker read-only access (or share the same id and rely on
# code-level read/write split).
[[kv_namespaces]]
binding = "ADMIN_KV_RO"
id      = "REPLACE_WITH_NEW_ADMIN_KV_ID"

[[kv_namespaces]]
binding = "POD_META"
id      = "8ec8759ab40d4709a831bf6b0e5241eb"

# D1 database for NIP-98 replay protection (atomic INSERT OR IGNORE),
# payment/quota tables (webledger_accounts, txo_deposits, quota_usage),
# and admin checks (members.is_admin / whitelist.is_admin).
# Shares the auth-worker's D1 database so cross-worker replay is detected.
# (Legacy NIP98_REPLAY KV binding removed — D1 INSERT OR IGNORE is atomic.)
[[d1_databases]]
binding       = "REPLAY_DB"
database_name = "dreamlab-auth"
database_id   = "e3981999-e8f0-4c07-9e4b-2e50859b8524"

# The relay's DB (dreamlab-relay) holds the CANONICAL whitelist + is_admin flag
# (set by the relay's dynamic-admin / set-admin flow). The pod-worker needs it to
# authorise admin-gated pod ops (e.g. POST /pods/{pk}/.deprovision, admin
# provisioning); its own REPLAY_DB (dreamlab-auth) does not carry is_admin for
# relay-side admins, so without this binding those ops 403 for every admin.
[[d1_databases]]
binding       = "RELAY_DB"
database_name = "dreamlab-relay"
database_id   = "97c77d23-0e24-4325-ada7-1747eab4095b"

[vars]
EXPECTED_ORIGIN  = "https://dreamlab-ai.com"
POD_BASE_URL     = "https://dreamlab-pod-api.solitary-paper-764d.workers.dev"
PAY_ENABLED      = "true"
PAY_COST_SATS    = "1"
PAY_TOKEN_TICKER = "DREAM"
PAY_TOKEN_RATE   = "10"
PAY_TOKEN_SUPPLY = "1000000"
