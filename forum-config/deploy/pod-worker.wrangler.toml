# pod-worker wrangler manifest for the DreamLab deployment.
#
# Preserved CF resource IDs from community-forum-rs/crates/pod-worker/wrangler.toml.

name = "dreamlab-pod-api"
main = "build/worker/shim.mjs"
compatibility_date = "2025-09-01"

[build]
command = "worker-build --release"

[[r2_buckets]]
binding     = "PODS"
bucket_name = "dreamlab-pods"

# Read-only ADMIN_KV view (split per audit H6 — pod-worker reads admin
# flags but cannot mutate them; auth-worker is the write authority).
# TODO(ops): provision via `wrangler kv:namespace create dreamlab-admin-kv`
# and grant pod-worker read-only access (or share the same id and rely on
# code-level read/write split).
[[kv_namespaces]]
binding = "ADMIN_KV_RO"
id      = "REPLACE_WITH_NEW_ADMIN_KV_ID"

[[kv_namespaces]]
binding = "POD_META"
id      = "8ec8759ab40d4709a831bf6b0e5241eb"

[[kv_namespaces]]
binding = "NIP98_REPLAY"
id      = "REPLACE_WITH_NEW_NIP98_REPLAY_KV_ID"

# D1 database for payment/quota tables (webledger_accounts, txo_deposits,
# quota_usage) and NIP-98 replay protection.  Shared with auth-worker (same
# database, different binding name: auth-worker uses "DB", pod-worker "REPLAY_DB").
[[d1_databases]]
binding       = "REPLAY_DB"
database_name = "dreamlab-auth"
database_id   = "e3981999-e8f0-4c07-9e4b-2e50859b8524"

[vars]
EXPECTED_ORIGIN  = "https://dreamlab-ai.com"
PAY_ENABLED      = "true"
PAY_COST_SATS    = "1"
PAY_TOKEN_TICKER = "DREAM"
PAY_TOKEN_RATE   = "10"
PAY_TOKEN_SUPPLY = "1000000"
