# DreamLab AI Community Forum — operator config (PRD-012 X1, ADR-085).
#
# Consumed at startup by `nostr_bbs_config::load_from_path`.
#
# Source of truth for every deployment-specific setting; the workers and the
# forum-client read this rather than hardcoding values. To switch hostnames /
# rebrand / change cohort taxonomy / federate, edit THIS file (not the kit).

# ─── Deployment ──────────────────────────────────────────────────────────────
[deployment]
name     = "DreamLab Community Forum"
hostname = "https://dreamlab-ai.com"

# ─── WebAuthn ────────────────────────────────────────────────────────────────
[webauthn]
rp_id            = "dreamlab-ai.com"
expected_origin  = "https://dreamlab-ai.com"

# ─── Solid Pod backend (Cloudflare R2) ───────────────────────────────────────
[pod]
base_url        = "https://dreamlab-pod-api.solitary-paper-764d.workers.dev"
storage_backend = "cf-r2"
r2_bucket       = "dreamlab-pods"

# ─── Nostr Relay ─────────────────────────────────────────────────────────────
[relay]
url             = "wss://dreamlab-nostr-relay.solitary-paper-764d.workers.dev"
ingress_policy  = "allowlist"

# ─── Admin pubkey resolution ─────────────────────────────────────────────────
# Static mode — admin pubkeys baked into config rather than resolved from D1.
# Switch to mode = "d1" when the admins-table backfill ships.
[admin]
mode            = "static"
static_pubkeys  = [
  # power-user — primary admin (matches auth-worker ADMIN_PUBKEYS CF secret)
  "11ed64225dd5e2c5e18f61ad43d5ad9272d08739d3a20dd25886197b0738663c",
  # operator-jjohare — human admin (Dr John O'Hare)
  "6407eed80e2a8646e41a5ddba0ae6619425fc54af40e2b30482b9623c682425a",
  # moderation-bot — automated moderation agent
  "5d80b5facd2d746689d7d2e400db6acce5843456967054adcf6956e4c734c54c",
  # calendar-bot — cross-zone NIP-52 scheduling (needs all zones)
  "be92ccf53d9d535fd21f3388201fd83b49588552fff5a1395fb60b6998df2243",
  # search-indexer — indexes all zones for search
  "d5194639ee3560204a1b5584a0714a6dd2a6c59953d0869b483e72ee185ada26",
]

# ─── Branding ────────────────────────────────────────────────────────────────
# `theme`, `node_name`, `location`, `banner_url`, `logo_url` are consumed by BOTH
# the Leptos forum client and the retro ASCII/BBS client (nostr-bbs-bbs-client,
# served at /community/bbs/). The kit projects them into window.__ENV__ as
# THEME / NODE_NAME / LOCATION / BANNER_URL / LOGO_URL; deploy.yml mirrors that
# injection. `theme` selects the BBS palette: amber | green | purple | sky.
[branding]
theme         = "amber"
node_name     = "DREAMLAB BBS"          # BBS masthead + status-bar node id
location      = "Lake District, UK"     # BBS status-bar location string
banner_url    = ""                       # optional ASCII-art / image banner
logo_url      = "https://dreamlab-ai.com/assets/logo.svg"
welcome_copy  = """
Welcome to the DreamLab AI Community Forum — \
a private space for trainers, builders, and the curious.\
"""

# ─── Zones ───────────────────────────────────────────────────────────────────
# Four-zone org model — see docs/architecture/forum-org-redesign.md. The relay
# enforces access from ZONE_CONFIG (deploy/relay-worker.wrangler.toml [vars]); the
# client renders tiles from window.__ENV__.ZONE_CONFIG (injected by deploy.yml).
# This block is the authored source for both. Cohorts: family, friends, business,
# agent (+ admin via [admin].static_pubkeys). visibility: public|locked|hidden.
[[zones]]
id                = "public"
display_name      = "Landing"
required_cohorts  = []
write_cohorts     = ["members", "friends", "agent"]
visibility        = "public"
banner_image_url  = "/images/heroes/lake-district-dawn.webp"
encrypted         = false

[[zones]]
id                = "minimoonoir"
display_name      = "Minimoonoir"
required_cohorts  = ["friends"]
visibility        = "locked"
banner_image_url  = "/images/heroes/minimoonoir-hero.webp"
encrypted         = false

[[zones]]
id                = "family"
display_name      = "Family"
required_cohorts  = ["family"]
visibility        = "locked"
banner_image_url  = "/images/heroes/family-hero.webp"
encrypted         = true

[[zones]]
id                = "business"
display_name      = "DreamLab"
required_cohorts  = ["business"]
visibility        = "locked"
banner_image_url  = "/images/heroes/business-hero.webp"
encrypted         = false

# ─── Trust thresholds ────────────────────────────────────────────────────────
[trust]
join_threshold  = 0     # any whitelisted user can join open channels
post_threshold  = 1     # +1 trust required to post in moderated channels

# ─── Invite system ───────────────────────────────────────────────────────────
[invites]
enabled              = true
# welcome-bot — dedicated agent identity (not the server key)
welcome_bot_pubkey   = "94f74e9c8938e0eae3223fcd9ce3a799e84cff389fd994aeb9dd336add0adf8f"

# ─── Moderation ──────────────────────────────────────────────────────────────
[moderation]
kinds_lo = 30910
kinds_hi = 30916

# ─── Federation mesh (PRD-010 Phase 3 / ADR-073) ────────────────────────────
# Controls cross-substrate federation behaviour. mode values:
#   "standalone"  — no federation; relay is loopback-only (default)
#   "federated"   — relay exposed externally; accepts peer connections
#   "client"      — subscribes to peers but does not accept inbound
[mesh]
mode                    = "standalone"
peer_relays             = []              # ws:// or wss:// URLs of mesh peers; populated post-Sprint-v12
federated_kinds         = [1, 1059, 30001, 30050, 30910, 31400, 31401, 31402, 31403, 31404, 31405]
allowed_remote_dids     = []              # did:nostr:<hex> of trusted peers
subscribed_kinds        = []              # subset of federated_kinds to pull; empty = all
honor_remote_moderation = false           # accept kind-30910 bans from peers

# ─── Rate limits (per-route) ─────────────────────────────────────────────────
[ratelimit]
profiles_batch_per_min      = 60     # /api/profiles/batch
nostr_well_known_per_min    = 60     # /.well-known/nostr.json
export_per_min              = 6      # /api/exports/*  (JSS Phase 1; bandwidth-heavy)

# ─── Feature flags ───────────────────────────────────────────────────────────
[features]
marketplace  = true
calendar     = true
dms          = true
governance   = true

# ─── Key provisioning (JSS Phase 1) ─────────────────────────────────────────
# DreamLab's CF tier provisions the Solid pod itself through the Worker-native
# `POST /.pods` / `/pods/{pubkey}/.provision` paths. Private keys are generated
# on-device by the forum client and never written to R2. The upstream
# solid-pod-rs-idp `provision-keys` helper remains native/tokio-only.
[provision]
enabled           = true                   # live: authenticated pod creation
keys_at_signup    = false                  # CF tier does not store private keys
private_dir       = "/private/"             # WAC-locked container path
privkey_filename  = "privkey.jsonld"        # NIP-19 bech32 keypair filename

# ─── NIP-05 resolution mode (JSS Phase 1) ───────────────────────────────────
# "d1"        — central registry only (legacy POD_META.nip05:{user} → pubkey).
# "federated" — D1 cache first, fall through to pod's /.well-known/nostr.json
#               on miss. Live as of NRF commit 1fe95fd (auth-worker resolve()
#               D1→pod-HTTP fallback under GET /api/username/resolve;
#               ADR-086 §9). Mirrored at deploy time via NIP05_RESOLVER_MODE
#               and POD_BASE_URL [vars] in deploy/auth-worker.wrangler.toml.
[nip05]
resolver_mode = "federated"                # live as of NRF 1fe95fd
pod_base_url  = "https://dreamlab-pod-api.solitary-paper-764d.workers.dev"

# ─── Pod data export (JSS Phase 1) ──────────────────────────────────────────
# The native solid-pod-rs export surface is tokio/Storage based and is not
# reachable from the Cloudflare Worker target yet. Keep disabled on DreamLab's
# CF deployment; enable only on a native pod backend that serves /api/exports/*.
[export]
enabled                  = false           # CF tier: native export route unavailable
include_private_default  = false           # owner WAC always required for /private/*
rate_limit_per_min       = 6                # per-IP; export is bandwidth-heavy

# ─── Git-versioned pods (JSS #471, solid-pod-rs alpha.12) ───────────────────
# When enabled at the pod backend (e.g. agentbox or a non-CF solid-pod-rs
# deployment), each pod is `git init`'d at creation with main branch and
# receive.denyCurrentBranch=updateInstead (solid_pod_rs_git::init::GitAutoInit,
# parity rows 199-200, shipped 2026-05-16). DreamLab's Cloudflare deployment
# cannot auto-init (CF Workers can't spawn subprocesses; see NRF ADR-089),
# so this stays disabled here; flip on for non-CF deployments (e.g. agentbox
# which has [sovereign_mesh.git].enabled = true as of agentbox commit ea64824b).
[git]
enabled        = false                  # CF Workers limitation; flip for native deploys
auto_init      = true                   # informational; takes effect when enabled = true
default_branch = "main"                 # pinned per JSS #471
clone_url_base = "https://dreamlab-pod-api.solitary-paper-764d.workers.dev"  # surfaces in forum-client

# ─── Native pod server (agentbox tier, solid-pod-rs alpha.15) ───────────────
# When enabled, the forum pod browser shows a SECOND pod card for the native
# agentbox server alongside the CF Workers pod. The native server has full git
# support (GitPanel + AppManifestPanel). Exposed via Cloudflare Tunnel.
#
# admin_provision_url: CF auth-worker calls this to provision a pod on the
# native server. The native server validates via X-Pod-Admin-Key (PSK).
# Match NATIVE_POD_ADMIN_KEY in the auth-worker CF secret with SOLID_ADMIN_KEY
# in the agentbox .env.
#
# allowlist_cohorts: only users in these cohorts see the native pod card.
# Empty list = all authenticated users.
[native_pod]
enabled              = true
base_url             = "https://pods-native.dreamlab-ai.com"
allowlist_cohorts    = ["family", "friends", "business"]
git_enabled          = true
admin_provision_url  = "https://pods-native.dreamlab-ai.com/_admin/provision"

# ─── Agent Governance (kinds 31400-31405) ────────────────────────────────────
# Pre-registered agent pubkeys authorised to publish governance control panels.
# Replace placeholder keys with real agent pubkeys at deployment time via
# DREAMLAB_GOVERNANCE_AGENT_PUBKEYS env-override.
[governance]
enabled       = true
route         = "/governance"
kinds_lo      = 31400
kinds_hi      = 31405

# Relay for governance events. Uses the main relay by default; set to a
# separate endpoint if governance traffic should be isolated.
relay_url     = "wss://dreamlab-nostr-relay.solitary-paper-764d.workers.dev"

# Agent pubkeys allowed to publish control surface events (kinds 31400-31405).
agent_pubkeys = [
  # visionclaw-server — BrokerActor publishes panel definitions (31400) and action requests (31402)
  "11ed64225dd5e2c5e18f61ad43d5ad9272d08739d3a20dd25886197b0738663c",
  # knowledge-enrichment-agent — proposes KG updates via governance
  "e18f1dc1d0bdf06aa5d9f9834f50077e550770eba8ce4435e83cf016647a0d30",
]

# ─── Payments (HTTP 402 Web Ledgers + MRC20 token) ──────────────────────────
[payments]
enabled   = true
cost_sats = 1

[payments.token]
ticker = "DREAM"
rate   = 10       # 10 DREAM per sat
supply = 1000000  # 1M total supply
issuer = ""       # operator sets via DREAMLAB_TOKEN_ISSUER env-override

