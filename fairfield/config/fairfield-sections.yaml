# Fairfield Nostr - Production Configuration
# THIS FILE IS GITIGNORED - contains deployment secrets
# Copy from fairfield-sections.example.yaml and fill in your values

# Application metadata
app:
  name: 'Minimoonoir'
  version: '1.0.0'
  defaultSection: 'fairfield-guests'

# Superuser configuration
superuser:
  pubkey: '11ed64225dd5e2c5e18f61ad43d5ad9272d08739d3a20dd25886197b0738663c'
  name: 'Instance Owner'
  relayUrl: 'wss://nostr-relay-617806532906.us-central1.run.app'

# Deployment URLs
deployment:
  relayUrl: 'wss://nostr-relay-617806532906.us-central1.run.app'
  embeddingApiUrl: 'https://embedding-api-617806532906.us-central1.run.app'
  gcsEmbeddingsUrl: 'https://storage.googleapis.com/minimoonoir-vectors'
  frontendUrl: 'https://jjohare.github.io/minimoonoir'

# Role definitions (hierarchical from lowest to highest)
roles:
  - id: 'guest'
    name: 'Guest'
    level: 0
    description: 'Basic authenticated user'

  - id: 'member'
    name: 'Member'
    level: 1
    description: 'Approved section member'

  - id: 'moderator'
    name: 'Moderator'
    level: 2
    description: 'Can manage channels and moderate content'
    capabilities:
      - 'channel.create'
      - 'channel.delete'
      - 'message.pin'
      - 'message.delete'

  - id: 'section-admin'
    name: 'Section Admin'
    level: 3
    description: 'Administrator for a specific section'
    capabilities:
      - 'section.manage'
      - 'member.approve'
      - 'member.remove'
      - 'channel.create'
      - 'channel.delete'
      - 'message.pin'
      - 'message.delete'

  - id: 'admin'
    name: 'Admin'
    level: 4
    description: 'Global administrator'
    capabilities:
      - 'admin.global'
      - 'section.create'
      - 'section.delete'
      - 'section.manage'
      - 'member.approve'
      - 'member.remove'
      - 'channel.create'
      - 'channel.delete'
      - 'message.pin'
      - 'message.delete'
      - 'user.whitelist'

# Cohort definitions (group memberships)
cohorts:
  - id: 'admin'
    name: 'Administrators'
    description: 'Global system administrators'

  - id: 'approved'
    name: 'Approved Users'
    description: 'Manually approved by admin'

  - id: 'business'
    name: 'Business Partners'
    description: 'Business collaborators'

  - id: 'moomaa-tribe'
    name: 'Moomaa Tribe'
    description: 'Core community members'

  - id: 'fairfield-residents'
    name: 'Fairfield Residents'
    description: 'Local community members'

# Section definitions - Original Fairfield naming
sections:
  - id: 'fairfield-guests'
    name: 'Fairfield Guests'
    description: 'Welcome area for visitors - open to all authenticated users'
    icon: '👋'
    order: 1
    access:
      requiresApproval: false
      defaultRole: 'guest'
      autoApprove: true
    features:
      showStats: true
      allowChannelCreation: false
      calendar:
        access: 'full'
        canCreate: false
    ui:
      color: '#6366f1'

  - id: 'minimoonoir-rooms'
    name: 'Minimoonoir'
    description: 'Core community chatrooms - request access to join'
    icon: '🌙'
    order: 2
    access:
      requiresApproval: true
      defaultRole: 'member'
      autoApprove: false
      requiredCohorts: []
    features:
      showStats: true
      allowChannelCreation: true
      calendar:
        access: 'full'
        canCreate: true
    ui:
      color: '#8b5cf6'

  - id: 'dreamlab'
    name: 'DreamLab'
    description: 'Creative and experimental projects - request access to join'
    icon: '✨'
    order: 3
    access:
      requiresApproval: true
      defaultRole: 'member'
      autoApprove: false
      requiredCohorts: []
    features:
      showStats: true
      allowChannelCreation: true
      calendar:
        access: 'availability'
        canCreate: true
        cohortRestricted: true
    ui:
      color: '#ec4899'

# Calendar access levels
calendarAccessLevels:
  - id: 'full'
    name: 'Full Access'
    canView: true
    canViewDetails: true

  - id: 'availability'
    name: 'Availability Only'
    canView: true
    canViewDetails: false

  - id: 'cohort'
    name: 'Cohort Restricted'
    canView: true
    canViewDetails: 'cohort-match'

  - id: 'none'
    name: 'No Access'
    canView: false
    canViewDetails: false

# Channel visibility options
channelVisibility:
  - id: 'public'
    name: 'Public'
  - id: 'cohort'
    name: 'Cohort Only'
  - id: 'invite'
    name: 'Invite Only'
