    <!-- GitHub Pages SPA deep-link restore: picks up redirect from root 404.html -->
    <script>
        (function(){
            var q = new URLSearchParams(window.location.search);
            var redirect = q.get('__p');
            if (redirect) {
                q.delete('__p');
                var qs = q.toString();
                var base = '/community';
                var full = base + redirect + (qs ? '?' + qs : '') + window.location.hash;
                history.replaceState(null, '', full);
            }
        })();
    </script>

         operator's real `window.__ENV__` (relay/auth/pod/search endpoints,
         zones, branding, build metadata). It is intentionally empty in the kit
         so an un-injected build (local Trunk, or CI without the deploy step)
         falls back to the client's own safe defaults — the production relay,
         a brand-neutral forum name, the legacy zone list, and "dev"/"local"
         build strings — rather than shipping any operator- or dev-specific
         endpoints that are unreachable off the dev box. -->
    <script>
