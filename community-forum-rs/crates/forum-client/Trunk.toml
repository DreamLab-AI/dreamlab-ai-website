[build]
target = "index.html"
dist = "../../dist"

[watch]
watch = ["src", "../nostr-core/src"]

[serve]
address = "127.0.0.1"
port = 8080

# wasm-opt explicitly disabled until --enable-bulk-memory-opt config lands.
# Rust 1.90 emits memory.copy/memory.fill ops that wasm-opt rejects without
# the bulk-memory feature flag. Trunk auto-runs wasm-opt unless `false` is
# set explicitly — commenting out is not enough. Re-enable via post_build
# hook with explicit feature flag in a follow-up.
# Net cost: ~30% larger WASM bundle on /community/.
[tools]
wasm_opt = false

# WebGPU particle system JS module — copied to dist/js/ for wasm-bindgen import
[[copy]]
src = "js/webgpu-particles.js"
dest = "js/webgpu-particles.js"
