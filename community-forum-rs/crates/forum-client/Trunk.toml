[build]
target = "index.html"
dist = "../../dist"

[watch]
watch = ["src", "../nostr-core/src"]

[serve]
address = "127.0.0.1"
port = 8080

# Optimize WASM binary size (30-50% reduction)
[tools]
wasm_opt = "version_122"

[[hooks]]
stage = "post_build"
command = "wasm-opt"
command_arguments = ["-Os", "--enable-bulk-memory", "--enable-simd", "{wasm_file}", "-o", "{wasm_file}"]
