name: Test and Lint (Reusable)

# Reusable pre-deploy gating workflow.
# Runs npm lint + build, cargo fmt/clippy/test on all workspace crates.
# Called via `workflow_call` from deploy.yml and workers-deploy.yml.
# Also runs on PRs to main as an independent quality gate.

on:
  workflow_call:
    outputs:
      passed:
        description: "True if all gates passed"
        value: ${{ jobs.gate.outputs.passed }}
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Default-restrictive permissions; jobs opt in if needed.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  gate:
    name: Test + Lint Gate
    runs-on: ubuntu-latest
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      passed: ${{ steps.summary.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node / React gates ──────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node deps
        run: npm ci

      - name: Lint (ESLint, non-blocking baseline)
        run: npm run lint
        continue-on-error: true

      - name: Build React site (verifies type/build correctness)
        run: npm run build
        env:
          VITE_SUPABASE_URL: 'https://stub.invalid'
          VITE_SUPABASE_ANON_KEY: 'stub'

      # ── Rust gates (forum-config overlay only) ──────────────────────────
      # community-forum-rs/ has been frozen and its crates published to
      # crates.io as nostr-bbs-* v3.0.0-rc4. The forum-config/ overlay
      # package is the only Rust code that changes going forward.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@0176485ebe2f605bde554dd99f804beeaf7db3e2 # 1.90.0
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            forum-config/target
          key: rust-gate-${{ runner.os }}-forum-config-${{ hashFiles('forum-config/Cargo.lock') }}
          restore-keys: |
            rust-gate-${{ runner.os }}-forum-config-

      - name: cargo fmt --check (forum-config)
        run: cargo fmt --manifest-path forum-config/Cargo.toml --all -- --check

      - name: cargo clippy (forum-config)
        run: cargo clippy --manifest-path forum-config/Cargo.toml --all-targets
        continue-on-error: true

      - name: cargo test (forum-config)
        run: cargo test --manifest-path forum-config/Cargo.toml

      - name: Summary
        id: summary
        if: always()
        run: |
          echo "passed=true" >> "$GITHUB_OUTPUT"
          echo "## Pre-deploy Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "All lint/test/build checks passed for commit ${{ github.sha }}." >> "$GITHUB_STEP_SUMMARY"
