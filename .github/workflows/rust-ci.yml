name: Rust CI

# Runs fmt/clippy/test against the nostr-bbs kit crates.
# Triggered by workflow_dispatch (manual) since kit source lives in a
# separate repo. The test-and-lint.yml workflow covers forum-config/ on
# every push/PR automatically.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: '1.90.0'
  KIT_REPO: 'https://github.com/DreamLab-AI/nostr-rust-forum.git'
  # Pinned kit SHA — keep in lockstep with workers-deploy.yml/deploy.yml KIT_REF.
  # NOTE: tracks nostr-rust-forum gap-close/2026-07 HEAD (forum gap-close slice).
  # Cutover provenance: docs/architecture/kit-compatibility-record.md.
  KIT_REF: '672b7c36bcef8a5c9f297523ec8986f7e1d7ffda'

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - run: |
          git clone --filter=blob:none --no-checkout ${{ env.KIT_REPO }} kit
          git -C kit checkout --detach ${{ env.KIT_REF }}
      - uses: dtolnay/rust-toolchain@0176485ebe2f605bde554dd99f804beeaf7db3e2 # 1.90.0
        with:
          components: rustfmt
      - run: cargo fmt --manifest-path kit/Cargo.toml --all -- --check

  clippy:
    name: Clippy (advisory)
    runs-on: ubuntu-latest
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - run: |
          git clone --filter=blob:none --no-checkout ${{ env.KIT_REPO }} kit
          git -C kit checkout --detach ${{ env.KIT_REF }}
      - uses: dtolnay/rust-toolchain@0176485ebe2f605bde554dd99f804beeaf7db3e2 # 1.90.0
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            kit/target
          key: rust-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('kit/Cargo.lock') }}
          restore-keys: rust-${{ env.RUST_TOOLCHAIN }}-
      - name: Clippy (warnings reported, not enforced)
        run: cargo clippy --manifest-path kit/Cargo.toml --all-targets

  test-native:
    name: Test (native)
    runs-on: ubuntu-latest
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - run: |
          git clone --filter=blob:none --no-checkout ${{ env.KIT_REPO }} kit
          git -C kit checkout --detach ${{ env.KIT_REF }}
      - uses: dtolnay/rust-toolchain@0176485ebe2f605bde554dd99f804beeaf7db3e2 # 1.90.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            kit/target
          key: rust-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('kit/Cargo.lock') }}
          restore-keys: rust-${{ env.RUST_TOOLCHAIN }}-
      - name: Test (native, all crates)
        run: |
          cargo test --manifest-path kit/Cargo.toml \
            -p nostr-bbs-core \
            -p nostr-bbs-auth-worker \
            -p nostr-bbs-pod-worker \
            -p nostr-bbs-preview-worker \
            -p nostr-bbs-search-worker \
            -p nostr-bbs-admin-cli
          cargo test --manifest-path kit/Cargo.toml \
            -p nostr-bbs-relay-worker --features test-exports

  test-wasm:
    name: Test (wasm)
    runs-on: ubuntu-latest
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - run: |
          git clone --filter=blob:none --no-checkout ${{ env.KIT_REPO }} kit
          git -C kit checkout --detach ${{ env.KIT_REF }}
      - uses: dtolnay/rust-toolchain@0176485ebe2f605bde554dd99f804beeaf7db3e2 # 1.90.0
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            kit/target
          key: rust-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('kit/Cargo.lock') }}
          restore-keys: rust-${{ env.RUST_TOOLCHAIN }}-
      - run: cargo install wasm-bindgen-cli --locked || true
      - run: cargo test --manifest-path kit/Cargo.toml --target wasm32-unknown-unknown -p nostr-bbs-core --no-run

  check-wasm-client:
    name: Check (wasm client)
    runs-on: ubuntu-latest
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - run: |
          git clone --filter=blob:none --no-checkout ${{ env.KIT_REPO }} kit
          git -C kit checkout --detach ${{ env.KIT_REF }}
      - uses: dtolnay/rust-toolchain@0176485ebe2f605bde554dd99f804beeaf7db3e2 # 1.90.0
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            kit/target
          key: rust-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('kit/Cargo.lock') }}
          restore-keys: rust-${{ env.RUST_TOOLCHAIN }}-
      - run: cargo check --manifest-path kit/Cargo.toml --target wasm32-unknown-unknown -p nostr-bbs-forum-client
