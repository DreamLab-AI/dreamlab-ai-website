name: Deploy Cloudflare Workers

# Deploys all 5 Rust Workers from the nostr-bbs kit (nostr-rust-forum).
# Source is cloned at build time; DreamLab-specific wrangler.toml configs
# from forum-config/deploy/ override the kit defaults.

on:
  push:
    branches: [main]
    paths:
      - 'forum-config/deploy/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  RUST_TOOLCHAIN: '1.90.0'
  WRANGLER_VERSION: '3.114.17'
  CF_SUBDOMAIN: 'solitary-paper-764d'
  KIT_REPO: 'https://github.com/DreamLab-AI/nostr-rust-forum.git'
  # Pinned to the exact commit resolved in forum-config/Cargo.lock (nostr-bbs-* rc11).
  # Do NOT float on `main`: a breaking upstream push would silently ship untested
  # worker code while the lockfile stays at this tested revision. Keep this SHA in
  # sync with the `rev = "..."` in forum-config/Cargo.lock when bumping the kit.
  KIT_REF: '49e718d900a31eac14b103de77d69750d6116d04'

jobs:
  gate:
    name: Pre-deploy Gate
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    uses: ./.github/workflows/test-and-lint.yml
    permissions:
      contents: read

  deploy-rust:
    name: Deploy Rust Workers
    needs: [gate]
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - kit_crate: nostr-bbs-auth-worker
            config: auth-worker
            worker_name: dreamlab-auth-api
          - kit_crate: nostr-bbs-pod-worker
            config: pod-worker
            worker_name: dreamlab-pod-api
          - kit_crate: nostr-bbs-preview-worker
            config: preview-worker
            worker_name: dreamlab-link-preview
          - kit_crate: nostr-bbs-relay-worker
            config: relay-worker
            worker_name: dreamlab-nostr-relay
          - kit_crate: nostr-bbs-search-worker
            config: search-worker
            worker_name: dreamlab-search-api

    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4

      - name: Clone kit (nostr-rust-forum) at pinned SHA
        run: |
          git clone --filter=blob:none --no-checkout ${{ env.KIT_REPO }} kit
          git -C kit checkout --detach ${{ env.KIT_REF }}

      - name: Override wrangler.toml with DreamLab config
        run: cp forum-config/deploy/${{ matrix.config }}.wrangler.toml kit/crates/${{ matrix.kit_crate }}/wrangler.toml

      - name: Setup Rust toolchain ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@1.90.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/worker-build
            kit/target
          key: rust-deploy-${{ env.RUST_TOOLCHAIN }}-${{ matrix.kit_crate }}-${{ hashFiles('kit/Cargo.lock') }}
          restore-keys: |
            rust-deploy-${{ env.RUST_TOOLCHAIN }}-${{ matrix.kit_crate }}-
            rust-deploy-${{ env.RUST_TOOLCHAIN }}-

      - name: Install worker-build
        run: |
          if ! command -v worker-build &>/dev/null; then
            cargo install worker-build --locked
          fi
          worker-build --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install wrangler ${{ env.WRANGLER_VERSION }}
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: Provision KV namespaces
        working-directory: kit/crates/${{ matrix.kit_crate }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          API_BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces"
          AUTH=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json")

          resolve_or_create() {
            local title="$1"
            local listing existing
            listing=$(curl -fsSL "${API_BASE}?per_page=100" "${AUTH[@]}" || echo '{"result":[]}')
            existing=$(echo "$listing" | jq -r --arg t "$title" \
              '.result[]? | select(.title == $t) | .id' | head -n 1)
            if [ -n "$existing" ] && [ "$existing" != "null" ]; then
              echo "[kv] $title -> $existing (existing)" >&2
              echo "$existing"
              return 0
            fi
            local create_resp
            create_resp=$(curl -fsSL -X POST "${API_BASE}" "${AUTH[@]}" \
              --data "{\"title\":\"${title}\"}" || echo '{}')
            local id
            id=$(echo "$create_resp" | jq -r '.result.id // empty' | head -n 1)
            if [ -z "$id" ] || [ "$id" = "null" ]; then
              listing=$(curl -fsSL "${API_BASE}?per_page=100" "${AUTH[@]}" || echo '{"result":[]}')
              id=$(echo "$listing" | jq -r --arg t "$title" \
                '.result[]? | select(.title == $t) | .id' | head -n 1)
            fi
            echo "[kv] $title -> $id (created)" >&2
            echo "$id"
          }
          for placeholder in REPLACE_WITH_NEW_ADMIN_KV_ID REPLACE_WITH_NEW_NIP98_REPLAY_KV_ID; do
            if grep -q "$placeholder" wrangler.toml; then
              case "$placeholder" in
                REPLACE_WITH_NEW_ADMIN_KV_ID)         title="${{ matrix.config }}-admin-kv" ;;
                REPLACE_WITH_NEW_NIP98_REPLAY_KV_ID)  title="${{ matrix.config }}-nip98-replay" ;;
              esac
              real_id=$(resolve_or_create "$title")
              if [ -z "$real_id" ] || [ "$real_id" = "null" ]; then
                echo "::error::failed to provision KV namespace $title" >&2
                exit 1
              fi
              sed -i "s/$placeholder/$real_id/g" wrangler.toml
              echo "[kv] substituted $placeholder -> $real_id" >&2
            fi
          done

      # Fail fast (deploy time, not request time) when an operator-provided
      # server secret is missing on the auth-worker. The kit auth-worker derives
      # the WebAuthn PRF salt from PRF_SERVER_SECRET; absent, register/login 500
      # on the first request. R-09: surface this as a deploy blocker instead.
      # Secrets are operator data — this only checks presence, never sets values.
      - name: Validate required auth-worker secrets are set
        if: matrix.config == 'auth-worker'
        working-directory: kit/crates/${{ matrix.kit_crate }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # `wrangler secret list` returns [{ "name": "...", "type": "secret_text" }, ...]
          SET_SECRETS=$(wrangler secret list 2>/dev/null | jq -r '.[].name' || true)
          MISSING=()
          # NATIVE_POD_ADMIN_KEY: PSK for the native pod tier (Gap 3). The
          # auth-worker's /api/native-pod/provision sends it as X-Pod-Admin-Key;
          # absent it 503s. NATIVE_POD_URL is a [vars] value (mirrored from
          # dreamlab.toml), but the key stays an operator secret (= agentbox
          # SOLID_ADMIN_KEY) — gated here, never generated by the pipeline.
          for required in PRF_SERVER_SECRET ADMIN_PUBKEYS NATIVE_POD_ADMIN_KEY; do
            if ! grep -qxF "$required" <<<"$SET_SECRETS"; then
              MISSING+=("$required")
            fi
          done
          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "::error::auth-worker is missing required secret(s): ${MISSING[*]}." \
                 "Set them with 'wrangler secret put <NAME> --name dreamlab-auth-api'" \
                 "(or run set-worker-secrets.yml) before deploying. These are" \
                 "operator-provided values — the pipeline never generates them." >&2
            exit 1
          fi
          echo "[secrets] all required auth-worker secrets present: PRF_SERVER_SECRET, ADMIN_PUBKEYS, NATIVE_POD_ADMIN_KEY"

      - name: Wrangler deploy ${{ matrix.kit_crate }}
        working-directory: kit/crates/${{ matrix.kit_crate }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy

  health-check:
    name: Health Checks
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    needs: [deploy-rust]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Wait for propagation
        run: sleep 10

      - name: Check all workers
        run: |
          set -euo pipefail
          PASS=0
          FAIL=0
          FAILED_WORKERS=()
          for worker in dreamlab-auth-api dreamlab-pod-api dreamlab-search-api dreamlab-nostr-relay dreamlab-link-preview; do
            URL="https://${worker}.${{ env.CF_SUBDOMAIN }}.workers.dev/health"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL" || echo "000")
            echo "${worker}: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "  PASS"
              PASS=$((PASS + 1))
            else
              echo "::error::${worker} health check FAILED (HTTP ${STATUS}); only HTTP 200 is accepted as healthy"
              FAIL=$((FAIL + 1))
              FAILED_WORKERS+=("${worker}(HTTP ${STATUS})")
            fi
          done
          echo ""
          echo "Results: ${PASS} passed, ${FAIL} failed"
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::Health check failed for: ${FAILED_WORKERS[*]}"
            exit 1
          fi

      - name: Deployment summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## Cloudflare Workers Deployment

          | Worker | Kit Crate | URL |
          |--------|-----------|-----|
          | dreamlab-auth-api | nostr-bbs-auth-worker | \`dreamlab-auth-api.${{ env.CF_SUBDOMAIN }}.workers.dev\` |
          | dreamlab-pod-api | nostr-bbs-pod-worker | \`dreamlab-pod-api.${{ env.CF_SUBDOMAIN }}.workers.dev\` |
          | dreamlab-link-preview | nostr-bbs-preview-worker | \`dreamlab-link-preview.${{ env.CF_SUBDOMAIN }}.workers.dev\` |
          | dreamlab-nostr-relay | nostr-bbs-relay-worker | \`dreamlab-nostr-relay.${{ env.CF_SUBDOMAIN }}.workers.dev\` |
          | dreamlab-search-api | nostr-bbs-search-worker | \`dreamlab-search-api.${{ env.CF_SUBDOMAIN }}.workers.dev\` |

          - **Kit**: \`nostr-rust-forum@${{ env.KIT_REF }}\`
          - **Wrangler**: \`${{ env.WRANGLER_VERSION }}\`
          - **Rust**: \`${{ env.RUST_TOOLCHAIN }}\`
          EOF
