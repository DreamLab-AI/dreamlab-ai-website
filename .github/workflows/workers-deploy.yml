name: Deploy Cloudflare Workers

# Deploys all 5 Rust Workers from community-forum-rs/crates/.
# Auth, Pod, Link-Preview, Nostr-Relay, and Search are all Rust.
# Runs on DreamLab-AI/dreamlab-ai-website fork only.

on:
  push:
    branches: [main]
    paths:
      - 'community-forum-rs/crates/relay-worker/**'
      - 'community-forum-rs/crates/preview-worker/**'
      - 'community-forum-rs/crates/pod-worker/**'
      - 'community-forum-rs/crates/auth-worker/**'
      - 'community-forum-rs/crates/search-worker/**'
      - 'community-forum-rs/crates/nostr-core/**'
      - 'community-forum-rs/Cargo.lock'
      - '.github/workflows/workers-deploy.yml'
      - '.github/workflows/test-and-lint.yml'
  workflow_dispatch:

# Cancel in-flight runs of this workflow on the same ref so a newer commit
# always wins the deploy race.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default-restrictive workflow permissions; jobs opt in to the minimum needed.
permissions:
  contents: read

env:
  NODE_VERSION: '20'
  RUST_TOOLCHAIN: '1.90.0'
  WRANGLER_VERSION: '3.114.17'
  CF_SUBDOMAIN: 'solitary-paper-764d'

jobs:
  # ─── Pre-deploy gate ────────────────────────────────────────────────────
  gate:
    name: Pre-deploy Gate
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    uses: ./.github/workflows/test-and-lint.yml
    permissions:
      contents: read

  # ─── Rust Workers (auth, pod, link-preview, nostr-relay, search) ───
  deploy-rust:
    name: Deploy Rust Workers
    needs: [gate]
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: auth-worker
            worker_name: dreamlab-auth-api
          - crate: pod-worker
            worker_name: dreamlab-pod-api
          - crate: preview-worker
            worker_name: dreamlab-link-preview
          - crate: relay-worker
            worker_name: dreamlab-nostr-relay
          - crate: search-worker
            worker_name: dreamlab-search-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@1.90.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/worker-build
            community-forum-rs/target
          key: rust-deploy-${{ env.RUST_TOOLCHAIN }}-${{ matrix.crate }}-${{ hashFiles('community-forum-rs/Cargo.lock') }}
          restore-keys: |
            rust-deploy-${{ env.RUST_TOOLCHAIN }}-${{ matrix.crate }}-
            rust-deploy-${{ env.RUST_TOOLCHAIN }}-

      - name: Install worker-build
        run: |
          if ! command -v worker-build &>/dev/null; then
            cargo install worker-build --locked
          fi
          worker-build --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Bypass cloudflare/wrangler-action because it ignored wranglerVersion
      # and tried to npx wrangler@4 interactively — fix-forward by pre-installing
      # our pinned version and invoking wrangler deploy directly. Same secrets,
      # same outcome, deterministic version.
      - name: Install wrangler ${{ env.WRANGLER_VERSION }}
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      # Sprint v9 added new KV bindings (NIP98_REPLAY for replay-protection
      # cache; ADMIN_KV / ADMIN_KV_RO to split admin KV namespace from POD_META).
      # Their `id` fields are placeholders in the committed wrangler.toml.
      # Resolve them at deploy time: ensure each namespace exists in the
      # account, capture its ID, substitute into a runner-local copy of
      # wrangler.toml. Idempotent — re-running creates only what's missing.
      - name: Provision KV namespaces (sprint v9)
        working-directory: community-forum-rs/crates/${{ matrix.crate }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # Bypass wrangler CLI for KV namespace listing — its `kv:namespace
          # list` and `kv namespace list` subcommands have silently failed in
          # this CI image (output captured to /dev/null then misparsed). Use
          # the Cloudflare REST API directly: we already have an account-scoped
          # API token in env. Idempotent across re-runs.
          API_BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces"
          AUTH=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json")

          resolve_or_create() {
            local title="$1"
            local listing existing
            listing=$(curl -fsSL "${API_BASE}?per_page=100" "${AUTH[@]}" || echo '{"result":[]}')
            existing=$(echo "$listing" | jq -r --arg t "$title" \
              '.result[]? | select(.title == $t) | .id' | head -n 1)
            if [ -n "$existing" ] && [ "$existing" != "null" ]; then
              echo "[kv] $title -> $existing (existing)" >&2
              echo "$existing"
              return 0
            fi
            local create_resp
            create_resp=$(curl -fsSL -X POST "${API_BASE}" "${AUTH[@]}" \
              --data "{\"title\":\"${title}\"}" || echo '{}')
            local id
            id=$(echo "$create_resp" | jq -r '.result.id // empty' | head -n 1)
            if [ -z "$id" ] || [ "$id" = "null" ]; then
              # Race: another matrix job created it. Re-list.
              listing=$(curl -fsSL "${API_BASE}?per_page=100" "${AUTH[@]}" || echo '{"result":[]}')
              id=$(echo "$listing" | jq -r --arg t "$title" \
                '.result[]? | select(.title == $t) | .id' | head -n 1)
            fi
            echo "[kv] $title -> $id (created)" >&2
            echo "$id"
          }
          for placeholder in REPLACE_WITH_NEW_ADMIN_KV_ID REPLACE_WITH_NEW_NIP98_REPLAY_KV_ID; do
            if grep -q "$placeholder" wrangler.toml; then
              case "$placeholder" in
                REPLACE_WITH_NEW_ADMIN_KV_ID)         title="${{ matrix.crate }}-admin-kv" ;;
                REPLACE_WITH_NEW_NIP98_REPLAY_KV_ID)  title="${{ matrix.crate }}-nip98-replay" ;;
              esac
              real_id=$(resolve_or_create "$title")
              if [ -z "$real_id" ] || [ "$real_id" = "null" ]; then
                echo "::error::failed to provision KV namespace $title" >&2
                exit 1
              fi
              sed -i "s/$placeholder/$real_id/g" wrangler.toml
              echo "[kv] substituted $placeholder -> $real_id" >&2
            fi
          done

      - name: Wrangler deploy ${{ matrix.crate }}
        working-directory: community-forum-rs/crates/${{ matrix.crate }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy

  # ─── Health checks ───────────────────────────────────────────────────
  health-check:
    name: Health Checks
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    needs: [deploy-rust]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Wait for propagation
        run: sleep 10

      - name: Check all workers
        run: |
          set -euo pipefail
          PASS=0
          FAIL=0
          FAILED_WORKERS=()
          for worker in dreamlab-auth-api dreamlab-pod-api dreamlab-search-api dreamlab-nostr-relay dreamlab-link-preview; do
            URL="https://${worker}.${{ env.CF_SUBDOMAIN }}.workers.dev/health"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL" || echo "000")
            echo "${worker}: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "  PASS"
              PASS=$((PASS + 1))
            else
              echo "::error::${worker} health check FAILED (HTTP ${STATUS}); only HTTP 200 is accepted as healthy"
              FAIL=$((FAIL + 1))
              FAILED_WORKERS+=("${worker}(HTTP ${STATUS})")
            fi
          done
          echo ""
          echo "Results: ${PASS} passed, ${FAIL} failed"
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::Health check failed for: ${FAILED_WORKERS[*]}"
            exit 1
          fi

      - name: Deployment summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## Cloudflare Workers Deployment

          ### Rust Workers (all 5)
          | Worker | Crate | URL |
          |--------|-------|-----|
          | dreamlab-auth-api | auth-worker | \`dreamlab-auth-api.${{ env.CF_SUBDOMAIN }}.workers.dev\` |
          | dreamlab-pod-api | pod-worker | \`dreamlab-pod-api.${{ env.CF_SUBDOMAIN }}.workers.dev\` |
          | dreamlab-link-preview | preview-worker | \`dreamlab-link-preview.${{ env.CF_SUBDOMAIN }}.workers.dev\` |
          | dreamlab-nostr-relay | relay-worker | \`dreamlab-nostr-relay.${{ env.CF_SUBDOMAIN }}.workers.dev\` |
          | dreamlab-search-api | search-worker | \`dreamlab-search-api.${{ env.CF_SUBDOMAIN }}.workers.dev\` |

          - **Wrangler**: \`${{ env.WRANGLER_VERSION }}\`
          - **Rust**: \`${{ env.RUST_TOOLCHAIN }}\`
          - **Branch**: \`${{ github.ref_name }}\`
          - **Commit**: \`${{ github.sha }}\`
          - **Actor**: @${{ github.actor }}
          EOF
