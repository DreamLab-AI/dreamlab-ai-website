name: Deploy Cloudflare Workers

# Deploys Rust Workers from community-forum-rs/crates/ and remaining TS Workers.
# Auth, Pod, and Link-Preview are Rust; Search and Nostr-Relay remain TypeScript.
# Runs on DreamLab-AI/dreamlab-ai-website fork only.

on:
  push:
    branches: [main]
    paths:
      - 'workers/search-api/**'
      - 'workers/nostr-relay/**'
      - 'community-forum-rs/crates/preview-worker/**'
      - 'community-forum-rs/crates/pod-worker/**'
      - 'community-forum-rs/crates/auth-worker/**'
      - 'community-forum-rs/crates/nostr-core/**'
      - 'community-forum-rs/Cargo.lock'
      - '.github/workflows/workers-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  CF_SUBDOMAIN: 'solitary-paper-764d'

jobs:
  # ─── TypeScript Workers (search-api + nostr-relay only) ─────────────
  deploy-ts:
    name: Deploy TS Workers
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Deploy search-api
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3'
          command: deploy -c workers/search-api/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy nostr-relay
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3'
          command: deploy -c workers/nostr-relay/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ─── Rust Workers (auth, pod, link-preview) ────────────────────────
  deploy-rust:
    name: Deploy Rust Workers
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: auth-worker
            worker_name: dreamlab-auth-api
          - crate: pod-worker
            worker_name: dreamlab-pod-api
          - crate: preview-worker
            worker_name: dreamlab-link-preview

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/worker-build
            community-forum-rs/target
          key: rust-deploy-${{ matrix.crate }}-${{ hashFiles('community-forum-rs/Cargo.lock') }}
          restore-keys: |
            rust-deploy-${{ matrix.crate }}-
            rust-deploy-

      - name: Install worker-build
        run: |
          if ! command -v worker-build &>/dev/null; then
            cargo install worker-build --locked
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build and deploy ${{ matrix.crate }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3'
          command: deploy
          workingDirectory: community-forum-rs/crates/${{ matrix.crate }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ─── Health checks (runs after both deploy jobs) ───────────────────
  health-check:
    name: Health Checks
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    needs: [deploy-ts, deploy-rust]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Wait for propagation
        run: sleep 10

      - name: Check all workers
        run: |
          PASS=0
          FAIL=0
          for worker in dreamlab-auth-api dreamlab-pod-api dreamlab-search-api dreamlab-nostr-relay dreamlab-link-preview; do
            URL="https://${worker}.${{ env.CF_SUBDOMAIN }}.workers.dev/health"
            if [ "$worker" = "dreamlab-search-api" ]; then
              URL="https://${worker}.${{ env.CF_SUBDOMAIN }}.workers.dev/status"
            fi
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL" || true)
            echo "${worker}: HTTP ${STATUS}"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "  PASS"
              PASS=$((PASS + 1))
            else
              echo "::warning::${worker} health check returned HTTP ${STATUS}"
              FAIL=$((FAIL + 1))
            fi
          done
          echo ""
          echo "Results: ${PASS} passed, ${FAIL} warnings"

      - name: Deployment summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## Cloudflare Workers Deployment

          ### Rust Workers
          | Worker | Crate | URL |
          |--------|-------|-----|
          | dreamlab-auth-api | auth-worker | \`dreamlab-auth-api.${{ env.CF_SUBDOMAIN }}.workers.dev\` |
          | dreamlab-pod-api | pod-worker | \`dreamlab-pod-api.${{ env.CF_SUBDOMAIN }}.workers.dev\` |
          | dreamlab-link-preview | preview-worker | \`dreamlab-link-preview.${{ env.CF_SUBDOMAIN }}.workers.dev\` |

          ### TypeScript Workers
          | Worker | URL |
          |--------|-----|
          | search-api | \`dreamlab-search-api.${{ env.CF_SUBDOMAIN }}.workers.dev\` |
          | nostr-relay | \`dreamlab-nostr-relay.${{ env.CF_SUBDOMAIN }}.workers.dev\` |

          - **Branch**: \`${{ github.ref_name }}\`
          - **Commit**: \`${{ github.sha }}\`
          - **Actor**: @${{ github.actor }}
          EOF
