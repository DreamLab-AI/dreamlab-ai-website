name: Clear D1 Data
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type CLEAR to confirm'
        required: true
        type: string

jobs:
  clear:
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website' && inputs.confirm == 'CLEAR'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: community-forum-rs/crates/relay-worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 info dreamlab-relay --json
          workingDirectory: community-forum-rs/crates/relay-worker

      - name: Clear relay events + whitelist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute dreamlab-relay --remote --command "DELETE FROM events;"
          npx wrangler d1 execute dreamlab-relay --remote --command "DELETE FROM whitelist;"

      - name: Clear auth credentials + challenges
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: community-forum-rs/crates/auth-worker
        run: |
          npx wrangler d1 execute dreamlab-auth --remote --command "DELETE FROM webauthn_credentials;"
          npx wrangler d1 execute dreamlab-auth --remote --command "DELETE FROM challenges;"

      - name: Verify relay is empty
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute dreamlab-relay --remote --command "SELECT 'events' as tbl, COUNT(*) as cnt FROM events UNION ALL SELECT 'whitelist', COUNT(*) FROM whitelist;"
