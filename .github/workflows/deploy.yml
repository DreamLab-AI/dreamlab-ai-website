name: Deploy to GitHub Pages

# Runs on DreamLab-AI/dreamlab-ai-website fork only.
# Does NOT run on upstream (TheDreamLabUK/website).
#
# Builds the Rust/WASM Leptos forum client via Trunk and deploys to
# GitHub Pages (dreamlab-ai.com) and optionally Cloudflare Pages.
#
# Rollback: revert the merge commit or reset main to the `pre-rust-deploy` tag.

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Production API URLs — baked into WASM via option_env!() at compile time
  VITE_RELAY_URL: 'wss://dreamlab-nostr-relay.solitary-paper-764d.workers.dev'
  VITE_AUTH_API_URL: 'https://dreamlab-auth-api.solitary-paper-764d.workers.dev'
  VITE_POD_API_URL: 'https://dreamlab-pod-api.solitary-paper-764d.workers.dev'
  VITE_SEARCH_API_URL: 'https://dreamlab-search-api.solitary-paper-764d.workers.dev'
  VITE_LINK_PREVIEW_API_URL: 'https://dreamlab-link-preview.solitary-paper-764d.workers.dev'

jobs:
  build-and-deploy:
    # Only run on the DreamLab-AI fork, skip if triggered on upstream
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            community-forum-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('community-forum-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Trunk
        run: |
          TRUNK_VERSION="0.21.12"
          curl -fsSL "https://github.com/trunk-rs/trunk/releases/download/v${TRUNK_VERSION}/trunk-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin
          trunk --version

      - name: Build Rust/WASM forum with Trunk
        working-directory: community-forum-rs/crates/forum-client
        run: trunk build --release

      - name: Inject runtime env config
        run: |
          # Inject window.__ENV__ into the built index.html so runtime overrides
          # work without recompiling. Inserted right before </head>.
          ENV_SCRIPT='<script>window.__ENV__={VITE_RELAY_URL:"'"$VITE_RELAY_URL"'",VITE_AUTH_API_URL:"'"$VITE_AUTH_API_URL"'",VITE_POD_API_URL:"'"$VITE_POD_API_URL"'",VITE_SEARCH_API_URL:"'"$VITE_SEARCH_API_URL"'",VITE_LINK_PREVIEW_API_URL:"'"$VITE_LINK_PREVIEW_API_URL"'"};</script>'
          sed -i "s|</head>|${ENV_SCRIPT}</head>|" community-forum-rs/dist/index.html
          echo "Injected window.__ENV__ into index.html"

      - name: Prepare deploy artifacts
        run: |
          DIST="community-forum-rs/dist"

          # SPA routing: copy index.html as 404.html so GitHub Pages
          # serves the app for all routes (client-side router handles them).
          cp "$DIST/index.html" "$DIST/404.html"

          # Prevent Jekyll processing
          touch "$DIST/.nojekyll"

          echo "Build artifacts:"
          ls -la "$DIST/"
          echo ""
          echo "WASM files:"
          ls -lh "$DIST/"*.wasm 2>/dev/null || echo "(none — may be in subfolder)"
          ls -lh "$DIST/"*.js 2>/dev/null || echo "(no JS files)"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./community-forum-rs/dist
          publish_branch: gh-pages
          force_orphan: true
          cname: dreamlab-ai.com
          commit_message: "Deploy Rust/WASM forum from ${{ github.sha }}"

      - name: Deploy to Cloudflare Pages
        if: vars.CLOUDFLARE_PAGES_ENABLED == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy community-forum-rs/dist/ --project-name=dreamlab-ai --commit-dirty=true
