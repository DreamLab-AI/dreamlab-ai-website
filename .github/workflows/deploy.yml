name: Deploy to GitHub Pages

# Builds the React main site + Rust/WASM Leptos forum client and deploys
# both to GitHub Pages (dreamlab-ai.com).
#
# Layout:
#   /              → React marketing site
#   /community/    → Leptos forum (Rust WASM, built from nostr-bbs kit)

on:
  push:
    branches: [main]
    paths:
      - 'forum-config/**'
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.*'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: '1.90.0'
  TRUNK_VERSION: '0.21.12'
  TRUNK_SHA256: 'e5261930aab979dc5d0388fdc71bc32bedf0a15211ef8c8703fa2b7a2016394b'
  # Pinned tool versions + sha256 of the exact release artifact each step fetches.
  # A privileged (CF-token-bearing) job must never execute an unverified download.
  BINARYEN_VERSION: '119'
  BINARYEN_SHA256: '716bcf9f5f36a6f466239fbb09a925eeaf54c46411ccefac979ec649e7c06d2d'
  TAILWIND_VERSION: '3.4.17'
  TAILWIND_SHA256: '7d24f7fa191d2193b78cd5f5a42a6093e14409521908529f42d80b11fde1f1d4'
  # API bases point at the deployed workers.dev hosts. The branded custom
  # domains (relay./api./pods./search./preview.dreamlab-ai.com) are the
  # documented end-state but are NOT provisioned in DNS (verified 2026-06-09:
  # ERR_NAME_NOT_RESOLVED; the apex is on GitHub Pages). Shipping them baked
  # into window.__ENV__ severed every client API call. All five workers are
  # live on workers.dev and already send Access-Control-Allow-Origin for
  # https://dreamlab-ai.com. When the operator provisions the custom domains,
  # flip these back in one commit.
  VITE_RELAY_URL: 'wss://dreamlab-nostr-relay.solitary-paper-764d.workers.dev'
  VITE_AUTH_API_URL: 'https://dreamlab-auth-api.solitary-paper-764d.workers.dev'
  VITE_POD_API_URL: 'https://dreamlab-pod-api.solitary-paper-764d.workers.dev'
  VITE_SEARCH_API_URL: 'https://dreamlab-search-api.solitary-paper-764d.workers.dev'
  VITE_LINK_PREVIEW_API_URL: 'https://dreamlab-link-preview.solitary-paper-764d.workers.dev'
  # Nostr DM recipients for the React site (contact form → admin, Talk-to-AI →
  # junkiejarvis). Canonical source is forum-config/dreamlab.toml (admin at :59,
  # junkiejarvis in [[agents]]). These are HAND-SYNCED mirrors, not generated —
  # per ADR-037 the O1/O2 single-source generator is deferred, so keep them in
  # lockstep with dreamlab.toml by hand when rotating (same posture as the
  # admin-pubkeys-sync mirrors). Injected into the React build env block below.
  # INTERIM per ADR-041: the operator's current working admin key (visionclaw-server,
  # dreamlab.toml:57, already relay-whitelisted so signup DMs deliver with no runbook
  # step). The ADR-040 D3 key-split runbook MUST re-point this to the newly minted
  # operator key when executed (and run scripts/seed/whitelist-admin-recipient.mjs
  # for it) — extending the split to a five-location atomic change.
  VITE_ADMIN_PUBKEY: '11ed64225dd5e2c5e18f61ad43d5ad9272d08739d3a20dd25886197b0738663c'
  VITE_JARVIS_PUBKEY: '2de44d5622eef79519ac078f6e227a85aecbaefd561e4e50c5f51dfadbf916e9'  # junkiejarvis — dreamlab.toml [[agents]]
  # Open relays the Talk-to-AI chat listens on for junkiejarvis's reply (ADR-042
  # amendment): the primary relay's whitelist gate rejects kind-1059 wraps
  # addressed to the ephemeral session key, so replies are only readable from
  # the open relays the agent also publishes to. MUST stay a subset of the
  # agent's NOSTR_RELAYS fan-out (agentbox .env) or replies are never seen.
  VITE_REPLY_RELAYS: 'wss://relay.damus.io,wss://relay.primal.net'
  # Zone (section) model for the forum client. Mirrors forum-config/dreamlab.toml
  # [[zones]] and the relay's ZONE_CONFIG [vars]. Injected into window.__ENV__ below.
  ZONE_CONFIG_JSON: '[{"id":"zone1","slug":"welcome","display_name":"Welcome","required_cohorts":[],"write_cohorts":["members","agent"],"banner_image_url":"/images/heroes/lake-district-dawn.webp","visibility":"public","encrypted":false,"accent_hex":"#22c55e"},{"id":"zone2","slug":"minimoonoir","display_name":"Minimoonoir","required_cohorts":["zone2","minimoonoir"],"banner_image_url":"/images/heroes/minimoonoir-hero.webp","visibility":"locked","encrypted":false,"accent_hex":"#3b82f6","section_order":["zone2-rants"]},{"id":"zone3","slug":"family","display_name":"Family","required_cohorts":["zone3","family"],"banner_image_url":"/images/heroes/family-hero.webp","visibility":"locked","encrypted":true,"accent_hex":"#f59e0b"},{"id":"zone4","slug":"dreamlab","display_name":"DreamLab","required_cohorts":["zone4","dreamlab"],"banner_image_url":"/images/heroes/business-hero.webp","visibility":"locked","encrypted":false,"accent_hex":"#a855f7"}]'
  FORUM_BASE: '/community'
  # BBS branding — projection of forum-config/dreamlab.toml [branding] for the
  # retro ASCII/BBS client (nostr-bbs-bbs-client, served at /community/bbs/).
  # The BBS reads THEME/NODE_NAME/TAGLINE/LOCATION/BANNER_URL/LOGO_URL +
  # RELAY_URL/POD_API/PREVIEW_API/SEARCH_API (note: un-prefixed, NOT the forum's
  # VITE_* names) + JARVIS_PUBKEY (F8 DM "Message Jarvis" quick-start) +
  # ZONE_CONFIG from window.__ENV__.
  BBS_THEME: 'amber'
  BBS_NODE_NAME: 'MINIMOONOIR'
  BBS_TAGLINE: 'private secure forums'
  BBS_LOCATION: 'Lake District, UK'
  BBS_BANNER_URL: ''
  BBS_LOGO_URL: 'https://dreamlab-ai.com/assets/logo.svg'
  KIT_REPO: 'https://github.com/DreamLab-AI/nostr-rust-forum.git'
  # Pinned to the exact commit resolved in forum-config/Cargo.lock.
  # Do NOT float on `main`: a breaking upstream push would silently ship untested
  # worker/WASM code while the lockfile stays at this tested revision. Keep this SHA
  # in sync with the `rev = "..."` in forum-config/Cargo.lock when bumping the kit.
  # NOTE: tracks nostr-rust-forum gap-close/2026-07 HEAD (COM-13 agent disclosure
  # badge + /api/agents/disclosure, F8 admin Agents roster tab, F1 member view,
  # COM-16/COM-17 decision integrity + graduated escalation). Cutover provenance
  # is in docs/architecture/kit-compatibility-record.md.
  KIT_REF: '672b7c36bcef8a5c9f297523ec8986f7e1d7ffda'

jobs:
  gate:
    name: Pre-deploy Gate
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    uses: ./.github/workflows/test-and-lint.yml
    permissions:
      contents: read

  build-and-deploy:
    name: Build + Deploy
    needs: [gate]
    if: github.repository == 'DreamLab-AI/dreamlab-ai-website'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Clone kit (nostr-rust-forum) at pinned SHA
        run: |
          git clone --filter=blob:none --no-checkout ${{ env.KIT_REPO }} kit
          git -C kit checkout --detach ${{ env.KIT_REF }}

      # ── React main site ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build React main site
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AUTH_API_URL: ${{ env.VITE_AUTH_API_URL }}
          # Nostr transport for the contact form + Talk-to-AI chat (ADR-041/042).
          # VITE_RELAY_URL already exists at workflow level; the pubkeys are the
          # hand-synced dreamlab.toml mirrors declared above.
          VITE_RELAY_URL: ${{ env.VITE_RELAY_URL }}
          VITE_ADMIN_PUBKEY: ${{ env.VITE_ADMIN_PUBKEY }}
          VITE_JARVIS_PUBKEY: ${{ env.VITE_JARVIS_PUBKEY }}
          VITE_REPLY_RELAYS: ${{ env.VITE_REPLY_RELAYS }}

      # ── Rust/WASM forum client ─────────────────────────────────────────
      - name: Install Rust toolchain ${{ env.RUST_TOOLCHAIN }}
        # Pinned to the commit the `1.90.0` branch resolves to (that branch's
        # action.yml hardcodes toolchain 1.90.0). Full SHA, not a mutable tag,
        # because this job carries CLOUDFLARE_API_TOKEN. Re-pin when bumping Rust.
        uses: dtolnay/rust-toolchain@0176485ebe2f605bde554dd99f804beeaf7db3e2 # 1.90.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            kit/target
          key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('kit/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-
            ${{ runner.os }}-cargo-

      - name: Install Trunk (pinned + SHA256-verified)
        run: |
          set -euo pipefail
          ARCHIVE="trunk-x86_64-unknown-linux-gnu.tar.gz"
          URL="https://github.com/trunk-rs/trunk/releases/download/v${TRUNK_VERSION}/${ARCHIVE}"
          curl -fsSL -o "${ARCHIVE}" "${URL}"
          echo "${TRUNK_SHA256}  ${ARCHIVE}" | sha256sum -c -
          tar xzf "${ARCHIVE}" -C /usr/local/bin
          rm -f "${ARCHIVE}"
          trunk --version

      - name: Install wasm-opt (binaryen, pinned + SHA256-verified)
        run: |
          set -euo pipefail
          ARCHIVE="binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz"
          URL="https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/${ARCHIVE}"
          curl -fsSL -o "${ARCHIVE}" "${URL}"
          echo "${BINARYEN_SHA256}  ${ARCHIVE}" | sha256sum -c -
          sudo tar -xzf "${ARCHIVE}" -C /usr/local --strip-components=1
          rm -f "${ARCHIVE}"
          wasm-opt --version

      - name: Install Tailwind CLI (pinned + SHA256-verified)
        run: |
          set -euo pipefail
          ARCHIVE="tailwindcss-linux-x64"
          URL="https://github.com/tailwindlabs/tailwindcss/releases/download/v${TAILWIND_VERSION}/${ARCHIVE}"
          curl -fsSL -o "${ARCHIVE}" "${URL}"
          echo "${TAILWIND_SHA256}  ${ARCHIVE}" | sha256sum -c -
          sudo install -m 0755 "${ARCHIVE}" /usr/local/bin/tailwindcss
          rm -f "${ARCHIVE}"
          tailwindcss --help | head -1

      - name: Build Leptos forum with Trunk
        working-directory: kit/crates/nostr-bbs-forum-client
        run: trunk build --release --public-url /community/
        env:
          NATIVE_POD_URL: ${{ secrets.NATIVE_POD_URL }}
          # Bakes the real RP domain into NIP-05 handles (was hardcoded
          # "example.test"). Used by signup.rs, onboarding_modal.rs, profile_cache.rs.
          NOSTR_BBS_NIP05_DOMAIN: 'dreamlab-ai.com'
          # signup.rs / the search client read these via option_env! at build
          # time (fallbacks were *.example.com / a dead members-search-api host).
          # The RELAY url is sourced at runtime from window.__ENV__, but the
          # search client (global_search.rs, search_client.rs) and the auth/pod
          # bases are compile-time option_env! — they MUST be passed here or the
          # WASM bakes the dead fallback and search silently fails.
          VITE_AUTH_API_URL: ${{ env.VITE_AUTH_API_URL }}
          VITE_POD_API_URL: ${{ env.VITE_POD_API_URL }}
          VITE_SEARCH_API_URL: ${{ env.VITE_SEARCH_API_URL }}

      - name: Report forum WASM bundle size
        run: |
          set -euo pipefail
          echo "=== Forum WASM bundle size ==="
          find kit/dist -name '*.wasm' -printf '%p  %s bytes\n' | \
            awk '{printf "%s  %.2f MB\n", $1, $2/1024/1024}'

      # ── Combine outputs ────────────────────────────────────────────────
      - name: Merge React + Forum into dist/
        run: |
          mkdir -p dist/community
          cp -r kit/dist/* dist/community/

          echo "=== React site ==="
          ls dist/index.html dist/assets/ | head -5

          echo "=== Forum (community/) ==="
          ls dist/community/

      - name: Inject runtime env config into forum
        run: |
          # Build identifiers for the forum Settings → Version row (#27): short
          # SHA of this website deploy commit + the UTC deploy date, so the
          # operator can tell whether a deployed build contains a given fix.
          BUILD_HASH="${GITHUB_SHA:0:7}"
          BUILD_VERSION="$(date -u +%Y.%m.%d)"
          ENV_SCRIPT='<script>window.__ENV__={BBS_PWA_ENABLED:"true",BRAND_LABEL:"Community",FORUM_NAME:"Community Forums",VITE_RELAY_URL:"'"$VITE_RELAY_URL"'",VITE_AUTH_API_URL:"'"$VITE_AUTH_API_URL"'",VITE_POD_API_URL:"'"$VITE_POD_API_URL"'",VITE_SEARCH_API_URL:"'"$VITE_SEARCH_API_URL"'",VITE_LINK_PREVIEW_API_URL:"'"$VITE_LINK_PREVIEW_API_URL"'",BUILD_VERSION:"'"$BUILD_VERSION"'",BUILD_HASH:"'"$BUILD_HASH"'",ZONE_CONFIG:'"$ZONE_CONFIG_JSON"'};</script>'
          sed -i "s|</head>|${ENV_SCRIPT}</head>|" dist/community/index.html
          echo "Injected window.__ENV__ into forum index.html (build $BUILD_VERSION $BUILD_HASH)"
          # SPA deep-link pickup for the forum. A hard load of /community/login
          # hits GitHub Pages' root 404.html, which redirects to
          # /community/?__p=%2Flogin. The Leptos router never reads __p, so the
          # app booted at the landing and the login route never rendered ("login
          # does nothing unless you enter from the top"). This synchronous head
          # script restores the original sub-path BEFORE the WASM app reads
          # window.location — note it re-prepends /community (the 404.html strips
          # it into __p), mirroring the React pickup injected into dist/index.html.
          FORUM_PICKUP='<script>(function(){var q=new URLSearchParams(window.location.search);var r=q.get("__p");if(r){q.delete("__p");var s=q.toString();history.replaceState(null,"","/community"+r+(s?"?"+s:""));}})();</script>'
          sed -i "s|</head>|${FORUM_PICKUP}</head>|" dist/community/index.html
          echo "Injected SPA __p deep-link pickup into forum index.html"
          # Per-deploy service-worker cache name so a new build evicts the old
          # cache on activate (the SW already network-firsts the HTML; this just
          # isolates static-asset caches per build). No-op if the token is absent.
          if [ -f dist/community/sw.js ]; then
            sed -i "s/__SW_BUILD__/${BUILD_HASH}/g" dist/community/sw.js
            echo "Stamped sw.js cache version: ${BUILD_HASH}"
          fi

      # Operator rebrand (kept out of the shared kit). The forum is presented as
      # "Community Forums" (issue #21: umbrella brand "Community", sections
      # Welcome / Minimoonoir / Family / DreamLab). The printed recovery-sheet
      # PDF takes its filename from document.title, so this also fixes that
      # name (feedback #12, #17). De-jargons the meta description.
      - name: Rebrand forum (Community Forums)
        run: |
          F=dist/community/index.html
          sed -i 's|<title>[^<]*</title>|<title>Community Forums</title>|' "$F"
          sed -i 's|<meta name="description" content="[^"]*"|<meta name="description" content="Community Forums — a private space for our community"|' "$F"
          sed -i 's|>Nostr BBS<|>Community<|g' "$F"
          sed -i 's|<meta name="apple-mobile-web-app-title" content="Forum" />|<meta name="apple-mobile-web-app-title" content="Community" />|' "$F"
          # PWA manifest for the MAIN interface (kit ships operator-generic
          # "Forum"; the installed app should carry this deployment's brand).
          M=dist/community/manifest.webmanifest
          if [ -f "$M" ]; then
            sed -i 's|"name": "Forum"|"name": "Community Forums"|; s|"short_name": "Forum"|"short_name": "Community"|' "$M"
            echo "Branded forum PWA manifest (Community)"
          fi
          echo "Rebranded forum to Community Forums (title/meta/loading)"

      # ── Retro ASCII/BBS client (nostr-bbs-bbs-client → /community/bbs/) ──────
      # Built AFTER the forum merge so the forum's `cp kit/dist/*` doesn't grab
      # the bbs subtree. Trunk.toml pins dist=../../dist/community/bbs and
      # public_url=/community/bbs/, so output lands in kit/dist/community/bbs.
      - name: Build retro ASCII/BBS client with Trunk
        working-directory: kit/crates/nostr-bbs-bbs-client
        run: trunk build --release

      - name: Merge + configure BBS at /community/bbs/
        run: |
          set -euo pipefail
          BUILD_HASH="${GITHUB_SHA:0:7}"
          BUILD_VERSION="$(date -u +%Y.%m.%d)"
          mkdir -p dist/community/bbs
          cp -r kit/dist/community/bbs/* dist/community/bbs/
          # PWA (ADR-109): stamp the SW cache token per deploy (mirrors the forum
          # sw.js stamping) and brand the operator-generic kit manifest + iOS
          # title with this deployment's node name.
          if [ -f dist/community/bbs/bbs-sw.js ]; then
            sed -i "s/__SW_BUILD__/${BUILD_HASH}/" dist/community/bbs/bbs-sw.js
          fi
          if [ -f dist/community/bbs/manifest.webmanifest ]; then
            sed -i "s/\"name\": \"BBS\"/\"name\": \"${BBS_NODE_NAME}\"/; s/\"short_name\": \"BBS\"/\"short_name\": \"${BBS_NODE_NAME}\"/" dist/community/bbs/manifest.webmanifest
          fi
          sed -i "s|\(apple-mobile-web-app-title\" content=\"\)BBS|\1${BBS_NODE_NAME}|" dist/community/bbs/index.html || true
          # The BBS reads RELAY_URL/POD_API/PREVIEW_API (not the forum's VITE_*
          # names) plus THEME/NODE_NAME/LOCATION/BANNER_URL/LOGO_URL/ZONE_CONFIG —
          # the forum-config/dreamlab.toml [branding] projection. PREVIEW_API is
          # the preview-worker base for the BBS ASCII image endpoint (/ascii).
          BBS_ENV='<script>window.__ENV__={BBS_PWA_ENABLED:"true",THEME:"'"$BBS_THEME"'",NODE_NAME:"'"$BBS_NODE_NAME"'",TAGLINE:"'"$BBS_TAGLINE"'",LOCATION:"'"$BBS_LOCATION"'",BANNER_URL:"'"$BBS_BANNER_URL"'",LOGO_URL:"'"$BBS_LOGO_URL"'",FORUM_NAME:"Community Forums",RELAY_URL:"'"$VITE_RELAY_URL"'",POD_API:"'"$VITE_POD_API_URL"'",PREVIEW_API:"'"$VITE_LINK_PREVIEW_API_URL"'",SEARCH_API:"'"$VITE_SEARCH_API_URL"'",JARVIS_PUBKEY:"'"$VITE_JARVIS_PUBKEY"'",VITE_AUTH_API_URL:"'"$VITE_AUTH_API_URL"'",VITE_SEARCH_API_URL:"'"$VITE_SEARCH_API_URL"'",VITE_LINK_PREVIEW_API_URL:"'"$VITE_LINK_PREVIEW_API_URL"'",BUILD_VERSION:"'"$BUILD_VERSION"'",BUILD_HASH:"'"$BUILD_HASH"'",ZONE_CONFIG:'"$ZONE_CONFIG_JSON"'};</script>'
          sed -i "s|</head>|${BBS_ENV}</head>|" dist/community/bbs/index.html
          # The BBS is a single-screen terminal (no URL sub-routes); a hard load of
          # /community/bbs/ serves this file directly. Provide a 404 fallback too.
          cp dist/community/bbs/index.html dist/community/bbs/404.html
          echo "Built + configured BBS at /community/bbs/ ($(ls dist/community/bbs | tr '\n' ' '))"

      - name: Create GitHub Pages SPA routing files
        run: |
          cat > dist/404.html << 'REDIRECT_EOF'
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>Redirecting...</title>
          <script>
            (function(){
              var loc = window.location;
              var path = loc.pathname;
              if (path === '/bbs' || path.startsWith('/bbs/')) {
                loc.replace(loc.protocol + '//' + loc.host + '/community/bbs/');
              } else if (path.startsWith('/community')) {
                var sub = path.slice('/community'.length) || '/';
                loc.replace(
                  loc.protocol + '//' + loc.host +
                  '/community/?__p=' + encodeURIComponent(sub + loc.search + loc.hash)
                );
              } else {
                loc.replace(
                  loc.protocol + '//' + loc.host +
                  '/?__p=' + encodeURIComponent(path + loc.search + loc.hash)
                );
              }
            })();
          </script>
          </head><body></body></html>
          REDIRECT_EOF

          cp dist/community/index.html dist/community/404.html
          touch dist/.nojekyll
          echo "SPA routing files created"

      - name: Inject React SPA redirect pickup
        run: |
          PICKUP='<script>(function(){var q=new URLSearchParams(window.location.search);var r=q.get("__p");if(r){q.delete("__p");var s=q.toString();history.replaceState(null,"",r+(s?"?"+s:""));}})();</script>'
          sed -i "s|</head>|${PICKUP}</head>|" dist/index.html
          echo "Injected SPA redirect pickup into React index.html"

      # ── Deploy ─────────────────────────────────────────────────────────
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3.9.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          cname: dreamlab-ai.com
          commit_message: "Deploy React + Leptos forum from ${{ github.sha }}"

      - name: Check mirror token
        id: mirror_token
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          DREAMLAB_UK_TOKEN: ${{ secrets.DREAMLAB_UK_TOKEN }}
        run: |
          if [ -n "${DREAMLAB_UK_TOKEN}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DREAMLAB_UK_TOKEN not set — skipping mirror push to thedreamlab.uk"
          fi

      - name: Deploy to thedreamlab.uk (mirror)
        if: steps.mirror_token.outputs.available == 'true'
        continue-on-error: true
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3.9.3
        with:
          personal_token: ${{ secrets.DREAMLAB_UK_TOKEN }}
          external_repository: TheDreamLabUK/website
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          cname: thedreamlab.uk
          commit_message: "Mirror deploy from DreamLab-AI/dreamlab-ai-website @ ${{ github.sha }}"

      - name: Deploy to Cloudflare Pages
        if: vars.CLOUDFLARE_PAGES_ENABLED == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3.114.17'
          command: pages deploy dist/ --project-name=dreamlab-ai --commit-dirty=true
