name: Set CF Worker secrets (native pod mesh)

# One-shot workflow: writes NATIVE_POD_URL and NATIVE_POD_ADMIN_KEY
# to the dreamlab-auth-api Cloudflare Worker via the CF Workers Secrets API.
# Trigger manually after updating the matching GH secrets.
# Safe to re-run — PUT is idempotent.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  set-secrets:
    name: Push secrets to dreamlab-auth-api
    runs-on: ubuntu-latest
    steps:
      - name: Set NATIVE_POD_URL on auth worker
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_VALUE: ${{ secrets.NATIVE_POD_URL }}
        run: |
          curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/workers/scripts/dreamlab-auth-api/secrets" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"NATIVE_POD_URL\",\"text\":\"${SECRET_VALUE}\",\"type\":\"secret_text\"}" \
            | jq -e '.success'

      - name: Set NATIVE_POD_ADMIN_KEY on auth worker
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_VALUE: ${{ secrets.NATIVE_POD_ADMIN_KEY }}
        run: |
          curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/workers/scripts/dreamlab-auth-api/secrets" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"NATIVE_POD_ADMIN_KEY\",\"text\":\"${SECRET_VALUE}\",\"type\":\"secret_text\"}" \
            | jq -e '.success'

      - name: Confirm
        run: echo "✓ Both secrets set on dreamlab-auth-api"
