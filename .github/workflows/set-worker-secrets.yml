name: Set CF Worker secrets (native pod mesh)

# One-shot workflow: writes the operator-provided secrets to the
# dreamlab-auth-api Cloudflare Worker via the CF Workers Secrets API:
#   NATIVE_POD_URL, NATIVE_POD_ADMIN_KEY  — native pod mesh PSK (Gap 3)
#   PRF_SERVER_SECRET                     — keys passkey PRF salt derivation
#   ADMIN_PUBKEYS                         — comma-sep 64-hex x-only admin pubkeys
# All four are validated by the workers-deploy.yml pre-deploy gate; the
# pipeline never generates them. Trigger manually after setting the matching
# GH repo secrets. Safe to re-run — PUT is idempotent.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  set-secrets:
    name: Push secrets to dreamlab-auth-api
    runs-on: ubuntu-latest
    steps:
      - name: Set NATIVE_POD_URL on auth worker
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_VALUE: ${{ secrets.NATIVE_POD_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SECRET_VALUE}" ]; then
            echo "::error::GH secret NATIVE_POD_URL is empty — set it first." >&2
            exit 1
          fi
          # Build the JSON body with jq so a value containing a quote or backslash
          # is escaped correctly instead of corrupting the stored secret.
          BODY=$(jq -n --arg name "NATIVE_POD_URL" --arg text "${SECRET_VALUE}" \
            '{name: $name, text: $text, type: "secret_text"}')
          curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/workers/scripts/dreamlab-auth-api/secrets" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "${BODY}" \
            | jq -e '.success'

      - name: Set NATIVE_POD_ADMIN_KEY on auth worker
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_VALUE: ${{ secrets.NATIVE_POD_ADMIN_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SECRET_VALUE}" ]; then
            echo "::error::GH secret NATIVE_POD_ADMIN_KEY is empty — set it first." >&2
            exit 1
          fi
          BODY=$(jq -n --arg name "NATIVE_POD_ADMIN_KEY" --arg text "${SECRET_VALUE}" \
            '{name: $name, text: $text, type: "secret_text"}')
          curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/workers/scripts/dreamlab-auth-api/secrets" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "${BODY}" \
            | jq -e '.success'

      - name: Set PRF_SERVER_SECRET on auth worker
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_VALUE: ${{ secrets.PRF_SERVER_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${SECRET_VALUE}" ]; then
            echo "::error::GH secret PRF_SERVER_SECRET is empty — set it first." >&2
            exit 1
          fi
          BODY=$(jq -n --arg name "PRF_SERVER_SECRET" --arg text "${SECRET_VALUE}" \
            '{name: $name, text: $text, type: "secret_text"}')
          curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/workers/scripts/dreamlab-auth-api/secrets" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "${BODY}" \
            | jq -e '.success'

      - name: Set ADMIN_PUBKEYS on auth worker
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_VALUE: ${{ secrets.ADMIN_PUBKEYS }}
        run: |
          set -euo pipefail
          if [ -z "${SECRET_VALUE}" ]; then
            echo "::error::GH secret ADMIN_PUBKEYS is empty — set it first." >&2
            exit 1
          fi
          BODY=$(jq -n --arg name "ADMIN_PUBKEYS" --arg text "${SECRET_VALUE}" \
            '{name: $name, text: $text, type: "secret_text"}')
          curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/workers/scripts/dreamlab-auth-api/secrets" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "${BODY}" \
            | jq -e '.success'

      - name: Confirm
        run: echo "✓ NATIVE_POD_URL, NATIVE_POD_ADMIN_KEY, PRF_SERVER_SECRET, ADMIN_PUBKEYS set on dreamlab-auth-api"
